services:
  backend:
    build: .
    container_name: bank-analysis-backend
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/bank-analysis
      JWT_SECRET: your_secret
      REDIS_URL: redis://redis:6379
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: "*"
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: bank-analysis-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bank-analysis-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:
